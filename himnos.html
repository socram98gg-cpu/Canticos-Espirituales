     // ===== MAPA DE SLUGS (para búsqueda rápida) =====
        const mapaSlugs = {};
        himnos.forEach((himno, index) => {
            mapaSlugs[himno.slug] = index;
        });

        // Variables de estado
        let himnosFiltrados = [...himnos];
        let himnoSeleccionado = null;
        let selectorAbierto = false;

        // ===== FUNCIONES DEL DROPDOWN =====
        function toggleSelector() {
            selectorAbierto = !selectorAbierto;
            const selector = document.getElementById('selectorHimno');
            if (selectorAbierto) {
                selector.classList.add('selector-abierto');
                // Enfocar el campo de búsqueda al abrir
                setTimeout(() => {
                    document.getElementById('buscarInterno').focus();
                }, 100);
            } else {
                selector.classList.remove('selector-abierto');
            }
        }

        function cerrarSelector() {
            selectorAbierto = false;
            document.getElementById('selectorHimno').classList.remove('selector-abierto');
        }

        // ===== MOSTRAR LISTA EN DROPDOWN =====
        function mostrarListaDropdown() {
            const lista = document.getElementById('listaHimnosDropdown');
            lista.innerHTML = '';
            
            himnosFiltrados.forEach((himno, index) => {
                const numReal = himnos.indexOf(himno) + 1;
                const li = document.createElement('li');
                li.className = himnoSeleccionado && himno.slug === himnoSeleccionado.slug ? 'seleccionado-lista' : '';
                li.setAttribute('data-slug', himno.slug);
                li.onclick = (e) => {
                    e.stopPropagation();
                    seleccionarHimno(himno.slug);
                    cerrarSelector();
                };
                
                const autorSpan = document.createElement('span');
                autorSpan.className = 'himno-autor-pequeno';
                autorSpan.textContent = himno.autores || himno.fuente || '';
                
                li.innerHTML = `${numReal}. ${himno.titulo} `;
                li.appendChild(autorSpan);
                
                lista.appendChild(li);
            });
        }

        // ===== ACTUALIZAR TÍTULO EN LA BARRA =====
        function actualizarTituloBarra() {
            const spanTitulo = document.getElementById('tituloSeleccionado');
            if (himnoSeleccionado) {
                const numReal = himnos.indexOf(himnoSeleccionado) + 1;
                spanTitulo.textContent = `${numReal}. ${himnoSeleccionado.titulo}`;
            } else {
                spanTitulo.textContent = 'Selecciona un cántico';
            }
        }

        // ===== SELECCIONAR HIMNO (por slug) =====
        function seleccionarHimno(slug) {
            const indexReal = mapaSlugs[slug];
            if (indexReal === undefined) return;
            
            const himno = himnos[indexReal];
            
            if (!himnosFiltrados.includes(himno)) {
                himnosFiltrados = [...himnos];
                document.getElementById('buscarInterno').value = '';
                mostrarListaDropdown();
            }
            
            himnoSeleccionado = himno;
            
            const visor = document.getElementById('visor-himno');
            const numReal = himnos.indexOf(himno) + 1;
            
            const lineas = himno.letra.split('\n');
            let letraHtml = '';
            lineas.forEach(linea => {
                if (linea.trim() === '') {
                    letraHtml += '<div class="separador-estrofa"></div>';
                } else {
                    letraHtml += `<p>${linea}</p>`;
                }
            });
            
            visor.innerHTML = `
                <div class="visor-header">
                    <div class="visor-numero">CÁNTICO ${numReal}</div>
                    <h2 class="visor-titulo">${himno.titulo}</h2>
                    <div class="visor-autor">${himno.autores || himno.fuente || ''}</div>
                </div>
                <div class="visor-letra">
                    ${letraHtml}
                </div>
            `;
            
            actualizarTituloBarra();
            mostrarListaDropdown();
            history.pushState(null, '', `?himno=${himno.slug}`);
        }

        // ===== BÚSQUEDA INTERNA =====
        function buscarInterno() {
            const texto = document.getElementById('buscarInterno').value.trim();
            
            if (texto === '') {
                himnosFiltrados = [...himnos];
            } else {
                const esNumero = /^\d+$/.test(texto);
                
                if (esNumero) {
                    const numeroBuscado = parseInt(texto, 10);
                    himnosFiltrados = himnos.filter((himno, index) => {
                        return (index + 1) === numeroBuscado;
                    });
                } else {
                    himnosFiltrados = himnos.filter(himno => 
                        himno.titulo.toLowerCase().includes(texto.toLowerCase()) ||
                        (himno.autores && himno.autores.toLowerCase().includes(texto.toLowerCase())) ||
                        (himno.fuente && himno.fuente.toLowerCase().includes(texto.toLowerCase()))
                    );
                }
            }
            
            mostrarListaDropdown();
            
            if (himnoSeleccionado && !himnosFiltrados.includes(himnoSeleccionado)) {
                himnoSeleccionado = null;
                actualizarTituloBarra();
                document.getElementById('visor-himno').innerHTML = '<div class="no-seleccionado">👆 Selecciona un cántico de la lista</div>';
            }
        }

        // ===== INICIALIZACIÓN =====
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('himno');
            
            document.getElementById('buscarInterno').addEventListener('input', buscarInterno);
            
            document.getElementById('buscarInterno').addEventListener('keyup', function(e) {
                if (e.key === 'Enter' && himnosFiltrados.length > 0) {
                    seleccionarHimno(himnosFiltrados[0].slug);
                    cerrarSelector();
                }
            });
            
            if (slug && mapaSlugs.hasOwnProperty(slug)) {
                seleccionarHimno(slug);
            } else {
                mostrarListaDropdown();
                actualizarTituloBarra();
            }
        };

        // ===== CERRAR SELECTOR AL HACER CLICK FUERA =====
        document.addEventListener('click', function(event) {
            const selector = document.getElementById('selectorHimno');
            if (!selector.contains(event.target) && selectorAbierto) {
                cerrarSelector();
            }
        });
