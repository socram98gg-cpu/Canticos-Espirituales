        // ===== MAPA DE SLUGS PARA BÚSQUEDA RÁPIDA =====
        const mapaSlugs = {};
        himnos.forEach((himno, index) => {
            mapaSlugs[himno.slug] = index;
        });

        // Variables de estado
        let himnosFiltrados = [...himnos];
        let himnoSeleccionado = null;

        // Función para mostrar la lista
        function mostrarLista() {
            const lista = document.getElementById('lista-himnos');
            const contador = document.getElementById('contador');
            
            lista.innerHTML = '';
            
            himnosFiltrados.forEach((himno, index) => {
                const li = document.createElement('li');
                const numReal = himnos.indexOf(himno) + 1; // número real en la lista completa
                li.className = himnoSeleccionado && himno.slug === himnoSeleccionado.slug ? 'seleccionado' : '';
                li.onclick = () => seleccionarHimno(himnosFiltrados.indexOf(himno));
                li.innerHTML = `
                    <a href="javascript:void(0);">${numReal}. ${himno.titulo}</a>
                    <div class="himno-autor">${himno.autores || himno.fuente || ''}</div>
                `;
                lista.appendChild(li);
            });
            
            contador.textContent = `Mostrando ${himnosFiltrados.length} de ${himnos.length} himnos`;
            actualizarBotonesNavegacion();
        }

        // Función para seleccionar un himno
        function seleccionarHimno(index) {
            const himno = himnosFiltrados[index];
            himnoSeleccionado = himno;
            
            const visor = document.getElementById('visor-himno');
            const numReal = himnos.indexOf(himno) + 1;
            
            // Procesar la letra: líneas con texto = <p>, líneas vacías = separador
            const lineas = himno.letra.split('\n');
            let letraHtml = '';
            lineas.forEach(linea => {
                if (linea.trim() === '') {
                    letraHtml += '<div class="separador-estrofa"></div>';
                } else {
                    letraHtml += `<p>${linea}</p>`;
                }
            });
            
            visor.innerHTML = `
                <div class="visor-header">
                    <div class="visor-numero">HIMNO ${numReal}</div>
                    <h2 class="visor-titulo">${himno.titulo}</h2>
                    <div class="visor-autor">${himno.autores || himno.fuente || ''}</div>
                </div>
                <div class="visor-letra">
                    ${letraHtml}
                </div>
            `;
            
            mostrarLista(); // actualiza la clase 'seleccionado' en la lista
            history.pushState(null, '', `?himno=${himno.slug}`);
        }

        // Función de búsqueda
        function buscarHimnos() {
            const texto = document.getElementById('buscarInput').value.toLowerCase();
            
            if (texto === '') {
                himnosFiltrados = [...himnos];
            } else {
                himnosFiltrados = himnos.filter(himno => 
                    himno.titulo.toLowerCase().includes(texto) ||
                    (himno.autores && himno.autores.toLowerCase().includes(texto)) ||
                    (himno.fuente && himno.fuente.toLowerCase().includes(texto))
                );
            }
            
            mostrarLista();
            
            if (himnoSeleccionado && !himnosFiltrados.includes(himnoSeleccionado)) {
                himnoSeleccionado = null;
                document.getElementById('visor-himno').innerHTML = '<div class="no-seleccionado">👆 Selecciona un himno de la lista</div>';
            }
        }

        // Navegación
        function navegarHimno(direccion) {
            if (!himnoSeleccionado) return;
            
            const indexActual = himnosFiltrados.findIndex(h => h.slug === himnoSeleccionado.slug);
            
            if (direccion === 'anterior' && indexActual > 0) {
                seleccionarHimno(indexActual - 1);
            } else if (direccion === 'siguiente' && indexActual < himnosFiltrados.length - 1) {
                seleccionarHimno(indexActual + 1);
            }
        }

        function actualizarBotonesNavegacion() {
            const btnAnterior = document.getElementById('btnAnterior');
            const btnSiguiente = document.getElementById('btnSiguiente');
            
            if (!himnoSeleccionado) {
                btnAnterior.disabled = true;
                btnSiguiente.disabled = true;
                return;
            }
            
            const indexActual = himnosFiltrados.findIndex(h => h.slug === himnoSeleccionado.slug);
            btnAnterior.disabled = indexActual <= 0;
            btnSiguiente.disabled = indexActual >= himnosFiltrados.length - 1;
        }

        // Cargar himno desde URL si existe
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('himno');
            
            if (slug && mapaSlugs.hasOwnProperty(slug)) {
                const indexReal = mapaSlugs[slug];
                // Buscar el índice en filtrados (si está filtrado, puede no aparecer)
                const indexFiltrado = himnosFiltrados.findIndex(h => h.slug === slug);
                if (indexFiltrado >= 0) {
                    seleccionarHimno(indexFiltrado);
                } else {
                    // Si no está en filtrados, mostramos todos y seleccionamos
                    himnosFiltrados = [...himnos];
                    mostrarLista();
                    const nuevoIndex = himnosFiltrados.findIndex(h => h.slug === slug);
                    if (nuevoIndex >= 0) seleccionarHimno(nuevoIndex);
                }
            } else {
                mostrarLista();
            }
        };

        // Búsqueda con tecla Enter
        document.getElementById('buscarInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                buscarHimnos();
            }
        });
    </script>
