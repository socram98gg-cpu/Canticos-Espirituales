<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himnos | Cánticos Espirituales</title>
    <style>
        /* Mismos estilos de antes... */
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f9f7f4;
            color: #2c3e50;
        }
        
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        
        .header-pagina {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .header-pagina h1 {
            color: #1e3c5c;
            margin: 0;
            font-size: 1.8em;
        }
        
        .btn-volver {
            background-color: #1e3c5c;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background-color 0.3s;
        }
        
        .btn-volver:hover {
            background-color: #d4af37;
            color: #1e3c5c;
        }
        
        /* ===== NUEVO: BUSCADOR Y FILTROS ===== */
        .buscador {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        #buscarInput {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            border: 2px solid #d4af37;
            border-radius: 4px;
            font-family: inherit;
        }
        
        .btn-buscar {
            background-color: #1e3c5c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }
        
        .btn-buscar:hover {
            background-color: #d4af37;
            color: #1e3c5c;
        }
        
        /* ===== LISTA DE HIMNOS ===== */
        .himno-lista {
            list-style: none;
            padding: 0;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .himno-lista li {
            margin: 0;
            padding: 15px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .himno-lista li:hover {
            background-color: #e8e2d8;
            border-left: 4px solid #d4af37;
        }
        
        .himno-lista li.seleccionado {
            background-color: #d4af37;
            color: white;
            font-weight: bold;
        }
        
        .himno-lista a {
            text-decoration: none;
            color: inherit;
            font-weight: bold;
            font-size: 1.1em;
            display: block;
        }
        
        .himno-autor {
            font-size: 0.85em;
            color: #5a6d7c;
            margin-top: 5px;
        }
        
        .himno-lista li.seleccionado .himno-autor {
            color: #1e3c5c;
        }
        
        /* ===== VISOR DE HIMNO ===== */
        .visor-himno {
            margin-top: 30px;
            padding: 25px;
            background-color: #f9f9f9;
            border: 2px solid #d4af37;
            border-radius: 8px;
        }
        
        .visor-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }
        
        .visor-numero {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .visor-titulo {
            color: #1e3c5c;
            font-size: 2em;
            margin: 10px 0 5px;
        }
        
        .visor-autor {
            color: #5a6d7c;
            font-style: italic;
        }
        
        .visor-letra {
            font-size: 1.1em;
            line-height: 1.8;
            white-space: pre-line;
            font-family: inherit;
        }
        
        .visor-letra p {
            margin: 15px 0;
            text-align: center;
        }
        
        .no-seleccionado {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }
        
        /* ===== BOTONES DE NAVEGACIÓN RÁPIDA ===== */
        .nav-rapida {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        
        .btn-nav {
            background-color: #1e3c5c;
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            border: none;
            cursor: pointer;
        }
        
        .btn-nav:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .btn-nav:hover:not(:disabled) {
            background-color: #d4af37;
            color: #1e3c5c;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #777;
        }
        
        .contador {
            color: #5a6d7c;
            margin: 10px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-pagina">
            <h1>📖 Himnario</h1>
            <a href="index.html" class="btn-volver">← Volver a Portada</a>
        </div>
        
        <!-- BUSCADOR -->
        <div class="buscador">
            <input type="text" id="buscarInput" placeholder="Buscar por título, número o autor..." autocomplete="off">
            <button class="btn-buscar" onclick="buscarHimnos()">Buscar</button>
        </div>
        
        <!-- CONTADOR -->
        <div class="contador" id="contador">Mostrando X de X himnos</div>
        
        <!-- LISTA Y VISOR EN DOS COLUMNAS (para pantallas grandes) -->
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <!-- LISTA DE HIMNOS -->
            <div>
                <ul class="himno-lista" id="lista-himnos">
                    <!-- Los himnos se cargarán aquí -->
                </ul>
            </div>
            
            <!-- VISOR DEL HIMNO SELECCIONADO -->
            <div class="visor-himno" id="visor-himno">
                <div class="no-seleccionado">
                    👆 Selecciona un himno de la lista
                </div>
            </div>
        </div>
        
        <!-- NAVEGACIÓN RÁPIDA -->
        <div class="nav-rapida">
            <button class="btn-nav" id="btnAnterior" onclick="navegarHimno('anterior')" disabled>← Anterior</button>
            <button class="btn-nav" id="btnSiguiente" onclick="navegarHimno('siguiente')" disabled>Siguiente →</button>
        </div>
        
        <footer>
            © 2025 - Primera Iglesia Bautista de Banes Ebenezer
        </footer>
    </div>

    <script>
        // ===== BASE DE DATOS DE HIMNOS (VERSIÓN COMPLETA) =====
        // Aquí es donde iremos agregando TODOS tus himnos
        const himnos = [
          { 
    numero: "59",
    titulo: "A Cristo Coronad",
    fuente: "HG",
    letra: `A Cristo coronad, divino Salvador;
Sentado en alta majestad es digno de loor;
Al Rey de gloria y paz loores tributad,
Y bendecid al Inmortal por toda eternidad.

A Cristo coronad, Señor de nuestro amor;
Al Rey triunfante celebrad, glorioso vencedor;
Potente Rey de paz, el triunfo consumó,
Y por Su muerte de dolor Su grande amor mostró.

A Cristo coronad, Señor de vida y luz;
Con alabanzas proclamad los triunfos de la cruz;
A Él solo adorad, Señor de salvación;
Loor eterno tributad de todo corazón.`
},
{ 
    numero: "22",
    titulo: "A Dios Demos Gloria",
    fuente: "HB",
    letra: `A Dios demos gloria, pues grande es él;
Su amor es inmenso y a su Hijo nos dio:
Quien fue a la cruz do sufrió muerte cruel,
Y así de los cielos las puertas abrió

CORO
Dad loor al Señor, oiga el mundo su voz;
Dad loor al Señor, nos gozamos en Dios.
Vengamos al Padre y a su Hijo Jesús,
Y démosle gloria por su gran poder.

Por darnos la vida su sangre vertió;
Jesús al creyente es promesa de Dios;
El vil pecador que de veras creyó
En ese momento perdón recibió.

Dios es el Maestro, potente Hacedor,
Y grande es el gozo que Cristo nos da;
Mas nuestro asombro será aún mayor
Al ver a Jesús que en su gloria vendrá.`
},
{ 
    numero: "4",
    titulo: "A Dios el Padre Celestial",
    fuente: "HB",
    letra: `A Dios el Padre celestial,
Al Hijo nuestro Redentor,
Y al eternal Consolador,
Unidos todos alabad.

Cantad al trino y uno Dios,
Sus alabanzas entonad;
Su eterna gloria proclamad
Con gozo, gratitud y amor.

Que la alabanza al Creador
Fluya de todo corazón;
Cantad el nombre del Señor
En toda lengua y nación.

Eterna es Tu bondad, Señor;
Verdad eterna es Tu voz.
Tu adoración se escuchará
Por toda la eternidad.`
},
{ 
    numero: "48",
    titulo: "A Dios Sea la Gloria",
    fuente: "HAC",
    letra: `A Dios sea la gloria, a Dios sea la gloria;
A Dios sea la gloria por lo que hizo por mí;
Con su sangre me ha limpiado, su poder me ha salvado,
A Dios sea la gloria por lo que hizo por mí.

Quiero vivir, Señor, rendido siempre sólo a ti;
Pongo a tus pies lo que soy, porque diste todo, Señor, por mi.
Con su sangre me ha limpiado, su poder me ha salvado,
A Dios sea la gloria por lo que hizo por mí.`
},
{ 
    numero: "196",
    titulo: "A Jesucristo Ven Sin Tardar",
    fuente: "HB",
    letra: `A Jesucristo ven sin tardar,
Que entre nosotros hoy él está,
Y te convida con dulce afán,
Tierno diciendo: "Ven"

CORO
¡Oh, cuan grata nuestra reunión
Cuando allá, Señor, en tu mansión,
Contigo estemos en comunión
Gozando eterno bien!

Piensa que él solo puede colmar
Tu triste pecho de gozo y paz;
Y porque anhela tu bienestar,
Vuelve a decirte: "Ven."

Su voz escucha sin demorar,
Y grato acepta lo que hoy te da;
Tal vez mañana no habrá lugar,
No te detengas: "Ven."`
}

        // Variables de estado
        let himnosFiltrados = [...himnos];
        let himnoSeleccionado = null;
        
        // Ordenar por número
        function ordenarPorNumero(lista) {
            return lista.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));
        }
        
        himnos = ordenarPorNumero(himnos);
        himnosFiltrados = ordenarPorNumero(himnosFiltrados);

        // Función para mostrar la lista de himnos
        function mostrarLista() {
            const lista = document.getElementById('lista-himnos');
            const contador = document.getElementById('contador');
            
            lista.innerHTML = '';
            
            himnosFiltrados.forEach((himno, index) => {
                const li = document.createElement('li');
                li.className = himnoSeleccionado && himno.numero === himnoSeleccionado.numero ? 'seleccionado' : '';
                li.onclick = () => seleccionarHimno(index);
                li.innerHTML = `
                    <a href="javascript:void(0);">${himno.numero}. ${himno.titulo}</a>
                    <div class="himno-autor">${himno.autores}</div>
                `;
                lista.appendChild(li);
            });
            
            contador.textContent = `Mostrando ${himosFiltrados.length} de ${himnos.length} himnos`;
            
            // Actualizar botones de navegación
            actualizarBotonesNavegacion();
        }

        // Función para seleccionar un himno
        function seleccionarHimno(index) {
            const himno = himnosFiltrados[index];
            himnoSeleccionado = himno;
            
            // Actualizar visor
            const visor = document.getElementById('visor-himno');
            visor.innerHTML = `
                <div class="visor-header">
                    <div class="visor-numero">HIMNO ${himno.numero}</div>
                    <h2 class="visor-titulo">${himno.titulo}</h2>
                    <div class="visor-autor">${himno.autores}</div>
                </div>
                <div class="visor-letra">
                    ${himno.letra.split('\n').map(linea => `<p>${linea}</p>`).join('')}
                </div>
            `;
            
            // Actualizar clase en la lista
            mostrarLista();
            
            // Actualizar URL sin recargar (para compartir)
            history.pushState(null, '', `?himno=${himno.numero}`);
        }

        // Función para buscar himnos
        function buscarHimnos() {
            const texto = document.getElementById('buscarInput').value.toLowerCase();
            
            if (texto === '') {
                himnosFiltrados = [...himnos];
            } else {
                himnosFiltrados = himnos.filter(himno => 
                    himno.titulo.toLowerCase().includes(texto) ||
                    himno.numero.includes(texto) ||
                    himno.autores.toLowerCase().includes(texto)
                );
            }
            
            himnosFiltrados = ordenarPorNumero(himosFiltrados);
            mostrarLista();
            
            // Limpiar selección si el himno seleccionado ya no está en la lista filtrada
            if (himnoSeleccionado && !himosFiltrados.includes(himnoSeleccionado)) {
                himnoSeleccionado = null;
                document.getElementById('visor-himno').innerHTML = '<div class="no-seleccionado">👆 Selecciona un himno de la lista</div>';
            }
        }

        // Función para navegar entre himnos
        function navegarHimno(direccion) {
            if (!himnoSeleccionado) return;
            
            const indexActual = himnosFiltrados.findIndex(h => h.numero === himnoSeleccionado.numero);
            
            if (direccion === 'anterior' && indexActual > 0) {
                seleccionarHimno(indexActual - 1);
            } else if (direccion === 'siguiente' && indexActual < himnosFiltrados.length - 1) {
                seleccionarHimno(indexActual + 1);
            }
        }

        // Función para actualizar botones de navegación
        function actualizarBotonesNavegacion() {
            const btnAnterior = document.getElementById('btnAnterior');
            const btnSiguiente = document.getElementById('btnSiguiente');
            
            if (!himnoSeleccionado) {
                btnAnterior.disabled = true;
                btnSiguiente.disabled = true;
                return;
            }
            
            const indexActual = himnosFiltrados.findIndex(h => h.numero === himnoSeleccionado.numero);
            
            btnAnterior.disabled = indexActual <= 0;
            btnSiguiente.disabled = indexActual >= himnosFiltrados.length - 1;
        }

        // Cargar himno desde URL si existe (?himno=34)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const himnoNumero = urlParams.get('himno');
            
            if (himnoNumero) {
                const index = himnosFiltrados.findIndex(h => h.numero === himnoNumero);
                if (index >= 0) {
                    seleccionarHimno(index);
                }
            }
            
            mostrarLista();
        }

        // Buscar mientras se escribe (opcional)
        document.getElementById('buscarInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                buscarHimnos();
            }
        });
    </script>
</body>
</html>
