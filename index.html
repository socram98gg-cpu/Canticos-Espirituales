<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cánticos Espirituales | IB Banes Ebenezer</title>
    <style>
        /* ===== ESTILOS GENERALES ===== */
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f9f7f4;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 700px;
            margin: 20px;
            background: white;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
            text-align: center;
        }
        
        /* ===== PORTADA (basada en tu imagen) ===== */
        .portada {
            margin-bottom: 30px;
        }
        
        .titulo-principal {
            font-size: 2.8em;
            font-weight: bold;
            letter-spacing: 3px;
            color: #1e3c5c;
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
            word-break: break-word;
        }
        
        .subtitulo {
            font-size: 1.3em;
            font-style: italic;
            color: #5a6d7c;
            margin: 20px 0 30px 0;
            border-top: 2px solid #d4af37;
            border-bottom: 2px solid #d4af37;
            padding: 12px 0;
            display: inline-block;
        }
        
        .iglesia {
            font-size: 1.5em;
            font-weight: 600;
            color: #1e3c5c;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
        }
        
        .anio {
            font-size: 2em;
            font-weight: bold;
            color: #d4af37;
            margin: 15px 0 25px 0;
            font-family: 'Arial', sans-serif;
        }
        
        /* ===== BOTÓN ===== */
        .btn-entrar {
            display: inline-block;
            background-color: #1e3c5c;
            color: white;
            padding: 15px 40px;
            font-size: 1.3em;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
            border: 2px solid #d4af37;
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .btn-entrar:hover {
            background-color: #d4af37;
            color: #1e3c5c;
            border-color: #1e3c5c;
            transform: scale(1.05);
        }
        
        /* ===== PIE DE PÁGINA ===== */
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #777;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== PORTADA COMPLETA ===== -->
        <div class="portada">
            <h1 class="titulo-principal">CÁNTICOS<br>ESPIRITUALES</h1>
            <div class="subtitulo">-Selección de cantos para el culto público-</div>
            <div class="iglesia">PRIMERA IGLESIA BAUTISTA<br>DE BANES EBENEZER</div>
            <div class="anio">2025</div>
            
            <!-- BOTÓN PARA ENTRAR A LOS HIMNOS -->
            <a href="himnos.html" class="btn-entrar">ENTRAR AL HIMNARIO →</a>
        </div>
        
        <footer>
            © 2025 - Primera Iglesia Bautista de Banes Ebenezer
        </footer>
    </div>
</body>
</html>
